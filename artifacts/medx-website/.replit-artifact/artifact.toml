kind = "web"
previewPath = "/"
title = "MEDX Website"
version = "1.0.0"
id = "artifacts/medx-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19761

[services.development]
run = "pnpm --filter @workspace/medx-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medx-website", "run", "build" ]
publicDir = "artifacts/medx-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19761"
BASE_PATH = "/"
